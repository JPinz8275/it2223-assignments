<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MortgageWise – Contact</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
  <header>
    <h1>MortgageWise</h1>
    <nav>
      <a href="index.html">Home</a> |
      <a href="about.html">About Us</a> |
      <a href="pricing.html">Pricing</a> |
      <strong><a href="contact.html">Contact Us</a></strong> |
      <a href="login.html">Login</a>
    </nav>
  </header>
  <main>
    <form action="validation.html" method="get">
    <section>
      <h2>Contact Us</h2>
      <p>Have questions about MortgageWise? Whether you're 
      ready to get started or just want to learn more, 
      we'd love to hear from you.</p>
    </section>
    <section>
      <h3>Send Us a Message</h3>
        <label>Full Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Email Address:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" required><br><br>

        <label>Interested In</label><br>
          <label><input type="radio" name="plan" value="Basic" required>Basic ($49)</label><br>
          <label><input type="radio" name="plan" value="Pro">Pro ($99)</label><br>
          <label><input type="radio" name="plan" value="Enterprise">Enterprise (Custom)</label><br>
          <label><input type="radio" name="plan" value="Other">Something Else</label>
        <br><br>

        <label>Message</label><br>
        <textarea name="message" rows="3"></textarea>
        <br><br>

        <button type="submit">Send Message</button>
    </section>
    </form>
  </main>
  <footer>
    <p>© 2026 MortgageWise</p>
  </footer>
</body>
</html>

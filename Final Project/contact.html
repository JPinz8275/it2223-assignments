<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MortgageWise – Contact</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
  <header>
    <h1>MortgageWise</h1>
    <nav>
      <a href="index.html">Home</a> |
      <a href="about.html">About Us</a> |
      <a href="pricing.html">Pricing</a> |
      <strong><a href="contact.html">Contact Us</a></strong> |
      <a href="login.html">Login</a>
    </nav>
  </header>
  <main>
    <form action="https://webdevbasics.net/scripts/demo.php" method="post">
    <section>
      <h2>Contact Us</h2>
      <p>Have questions about MortgageWise? Whether you're 
      ready to get started or just want to learn more, 
      we'd love to hear from you.</p>
    </section>
    <section>
      <h3>Send Us a Message</h3>
        <label for="name">Full Name</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email Address</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="phone">Phone Number</label><br>
        <input type="tel" id="phone" name="phone"><br><br>

        <label>Interested In</label><br>
          <label><input type="radio" name="plan" value="Basic">Basic ($49)</label><br>
          <label><input type="radio" name="plan" value="Pro">Pro ($99)</label><br>
          <label><input type="radio" name="plan" value="Enterprise">Enterprise (Custom)</label><br>
          <label><input type="radio" name="plan" value="Other">Something Else</label>
        <br><br>

        <label for="message">Message</label><br>
        <textarea id="message" name="message" rows="3"></textarea>
        <br><br>

        <button type="submit">Send Message</button>
    </section>
    </form>
  </main>
  <footer>
    <p>© 2026 MortgageWise</p>
  </footer>
</body>
</html>
